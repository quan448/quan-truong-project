<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homework Two: Advanced Selectors and Display</title>
  <!-- Nhớ kiểm tra đường dẫn file CSS xem đúng chưa nha -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Khúc này chuẩn rồi nè ní -->
  <a href="#main-content" class="skip-link">Skip to Main Content</a>

  <nav>
    <img src="logo.png" alt="Logo">
    <!-- Thêm vài link để test xem nav inline-block chạy ổn không -->
    <a href="#">Home</a>
    <a href="#">Parks</a>
    <a href="#">About</a>
  </nav>

  <main id="main-content">
    <h1>Welcome to My Website</h1>

    <!-- Khu vực test GRID CLASS (Chia 2 cột, mỗi cột 40%) -->
    <h2>Grid Gallery (2 Columns)</h2>
    <div class="grid">
      <div class="grid-item">
        <img src="park1.jpg" alt="Beautiful National Park with trees">
        <p>National Park One description</p>
      </div>
      <div class="grid-item">
        <img src="park2.jpg" alt="Beautiful National Park with mountains">
        <p>National Park Two description</p>
      </div>
    </div>

    <hr>

    <!-- Khu vực test FLEX CLASS (Dùng cho trang Parks) -->
    <h2>Flexbox Layout</h2>
    <div class="flex">
      <div class="flex-item">Card 1</div>
      <div class="flex-item">Card 2</div>
      <div class="flex-item">Card 3</div>
    </div>
  </main>

</body>
</html>
